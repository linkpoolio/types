syntax="proto3";

package imrpc;

option go_package = "github.com/longhorn/types/pkg/generated/imrpc";

import "google/protobuf/empty.proto";
import "imrpc/common.proto";
import "imrpc/imrpc.proto";

service InstanceService {
	rpc InstanceCreate(InstanceCreateRequest) returns (InstanceResponse) {}
	rpc InstanceDelete(InstanceDeleteRequest) returns (InstanceResponse) {}
	rpc InstanceGet(InstanceGetRequest) returns (InstanceResponse) {}
	rpc InstanceList(google.protobuf.Empty) returns (InstanceListResponse) {}
	rpc InstanceLog(InstanceLogRequest) returns (stream LogResponse) {}
	rpc InstanceWatch(google.protobuf.Empty) returns (stream google.protobuf.Empty) {}
	rpc InstanceReplace(InstanceReplaceRequest) returns (InstanceResponse) {}
	rpc InstanceSuspend(InstanceSuspendRequest) returns (google.protobuf.Empty) {}
	rpc InstanceResume(InstanceResumeRequest) returns (google.protobuf.Empty) {}
	rpc InstanceSwitchOverTarget(InstanceSwitchOverTargetRequest) returns (google.protobuf.Empty) {}
	rpc InstanceDeleteTarget(InstanceDeleteTargetRequest) returns (google.protobuf.Empty) {}

	rpc LogSetLevel(LogSetLevelRequest) returns (google.protobuf.Empty);
	rpc LogSetFlags(LogSetFlagsRequest) returns (google.protobuf.Empty);
	rpc LogGetLevel(LogGetLevelRequest) returns (LogGetLevelResponse);
	rpc LogGetFlags(LogGetFlagsRequest) returns (LogGetFlagsResponse);

	rpc VersionGet(google.protobuf.Empty) returns (VersionResponse);
}

message ProcessInstanceSpec {
	string binary = 1;
	repeated string args = 2;
}

message SpdkInstanceSpec {
	map<string, string> replica_address_map = 1;
	string disk_name = 2;
	string disk_uuid = 3;
	uint64 size = 4;
	bool expose_required = 5;
	string frontend = 6;
	bool salvage_requested = 7;
	string backing_image_name = 8;
	int32 ublk_queue_depth = 9;
	int32 ublk_number_of_queue = 10;
	// replica_transport_address_map is the transport-aware replacement for
	// replica_address_map. Keyed by replica name, each value carries the
	// replica's tcp_address and (optionally) rdma_address so the engine can
	// pick whichever transport matches its own node transport at attach time.
	// Legacy replica_address_map is retained for wire compatibility with older
	// managers that don't populate this map.
	map<string, ReplicaTransportAddresses> replica_transport_address_map = 11;
	// qos_limits caps aggregate raid bdev I/O for engine instances. Mapped
	// by the IM into spdkrpc.EngineCreateRequest.qos_limits which is then
	// applied via SPDK's bdev_set_qos_limit on the raid bdev. All-zero
	// fields means unlimited.
	QosLimits qos_limits = 12;
}

// QosLimits maps to SPDK's bdev_set_qos_limit parameters one-to-one.
message QosLimits {
	int64 rw_ios_per_sec = 1;
	int64 rw_mb_per_sec = 2;
	int64 r_mb_per_sec = 3;
	int64 w_mb_per_sec = 4;
}

// ReplicaTransportAddresses carries both transport-qualified NVMe-oF addresses
// for a single replica. tcp_address is always populated on dual-listener-aware
// replicas; rdma_address is empty on TCP-only storage nodes.
message ReplicaTransportAddresses {
	string tcp_address = 1;
	string rdma_address = 2;
}

message InstanceSpec {
	// Deprecated: Replaced by `data_engine`.
	BackendStoreDriver backend_store_driver = 1 [deprecated=true];
	string name = 2;
	string type = 3;
	string volume_name = 4;

	int32 port_count = 5;
	repeated string port_args = 6;

	ProcessInstanceSpec process_instance_spec = 7;
	SpdkInstanceSpec spdk_instance_spec = 8;
	DataEngine data_engine = 9;

	bool upgrade_required = 10;
	string initiator_address = 11;
	string target_address = 12;
	string engine_name = 13;
}

message EngineFrontendNvmeTcpPath {
	string engine_name = 1;
	string target_ip = 2;
	int32 target_port = 3;
	string nqn = 4;
	string nguid = 5;
	string ana_state = 6;
}

message InstanceStatus {
	string state = 1;
	string error_msg = 2;
	int32 port_start = 3;
	int32 port_end = 4;
	map<string, bool> conditions = 5;
	int32 target_port_start = 6;
	int32 target_port_end = 7;
	int32 standby_target_port_start = 8;
	int32 standby_target_port_end = 9;
	int32 ublk_id = 10;
	string uuid = 11;
	string engine_name = 12;
	string endpoint = 13;
	string frontend = 14;
	string active_path = 15;
	string preferred_path = 16;
	repeated EngineFrontendNvmeTcpPath paths = 17;
	// tcp_port is this replica's TCP NVMe-oF listener port. Equals port_start
	// on TCP-only storage nodes, equals port_start+1 on RDMA-capable storage
	// nodes. Zero on v1 data engine or pre-dual-listener replicas.
	int32 tcp_port = 18;
	// rdma_port is this replica's RDMA NVMe-oF listener port. Zero when the
	// storage node has no RDMA capability or on v1 replicas.
	int32 rdma_port = 19;
}

message InstanceCreateRequest {
	InstanceSpec spec = 1;
}

message InstanceDeleteRequest {
	// Deprecated: Replaced by `data_engine`.
	BackendStoreDriver backend_store_driver = 1 [deprecated=true];
	string name = 2;
	string type = 3;

	string disk_uuid = 4;
	bool cleanup_required = 5;
	DataEngine data_engine = 6;
	string uuid = 7;	
}

message InstanceGetRequest {
	// Deprecated: Replaced by `data_engine`.
	BackendStoreDriver backend_store_driver = 1 [deprecated=true];
	string name = 2;
	string type = 3;
	DataEngine data_engine = 4;
}

message InstanceResponse {
	InstanceSpec spec = 1;
	InstanceStatus status = 2;
	bool deleted = 3;
}

message InstanceListResponse{
	map<string, InstanceResponse> instances = 1;
}

message InstanceLogRequest {
	// Deprecated: Replaced by `data_engine`.
	BackendStoreDriver backend_store_driver = 1 [deprecated=true];
	string name = 2;
	string type = 3;
	DataEngine data_engine = 4;
}

message InstanceReplaceRequest {
	InstanceSpec spec = 1;
	string terminate_signal = 2;
}

message InstanceSuspendRequest {
	DataEngine data_engine = 1;
	string name = 2;
	string type = 3;
}

message InstanceResumeRequest {
	DataEngine data_engine = 1;
	string name = 2;
	string type = 3;
}

message InstanceSwitchOverTargetRequest {
	DataEngine data_engine = 1;
	string name = 2;
	string type = 3;
	string target_address = 4;
	string engine_name = 5;
	// switchover_phase controls which phase of the three-phase ANA transition
	// to execute. See spdkrpc.EngineFrontendSwitchOverRequest for details.
	string switchover_phase = 6;
}

message InstanceDeleteTargetRequest {
	DataEngine data_engine = 1;
	string name = 2;
	string type = 3;
}

message LogSetLevelRequest {
	DataEngine data_engine = 1;
	string level = 2;
}

message LogSetFlagsRequest {
	DataEngine data_engine = 1;
	string flags = 2;
}

message LogGetLevelRequest {
	DataEngine data_engine = 1;
}

message LogGetLevelResponse {
	string level = 1;
}

message LogGetFlagsRequest {
	DataEngine data_engine = 1;
}

message LogGetFlagsResponse {
	string flags = 1;
}
